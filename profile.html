<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Portfolio | SkillHive</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#080e1a',
                        card: '#131f35',
                        gold: '#f5a623',
                        emerald: '#22c55e',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Supabase Core -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="backend.js"></script>

    <style>
        body {
            background-color: #080e1a;
            color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }

        /* Glassmorphic Components */
        .glass-panel {
            background: rgba(19, 31, 53, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Breathing Animations */
        @keyframes breath-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); transform: scale(1.1); }
        }
        .animate-breath-green {
            animation: breath-green 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #080e1a; }
        ::-webkit-scrollbar-thumb { background: #131f35; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #f5a623; }

        /* Lightbox */
        #lightbox {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }
        /* High-contrast and Busy states */
        #content-state p, .rev-comment, #content-state div, #profileContent p, #profileContent div {
            color: rgba(255, 255, 255, 0.88) !important;
            line-height: 1.6;
            font-size: 0.92rem;
        }

        .whatsapp-btn.busy-state {
            background: rgba(239, 68, 68, 0.12) !important;
            color: #ef4444 !important;
            border: 1px solid rgba(239, 68, 68, 0.35) !important;
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.15) !important;
            cursor: not-allowed !important;
            opacity: 1 !important;
            transform: none !important;
        }

        /* Premium Hero Banner Architecture */
        .hero-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 24px 50px rgba(0,0,0,0.4);
            position: relative;
        }
        .hero-cover {
            height: 130px;
            background: linear-gradient(135deg, rgba(26,58,92,0.8), rgba(10,22,40,0.9)), repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .hero-avatar-wrapper {
            position: relative;
            width: 130px; height: 130px;
            margin: -65px auto 16px;
            border-radius: 50%;
            border: 6px solid #080e1a;
            box-shadow: 0 12px 30px rgba(245,166,35,0.25);
            background: #1a3a5c;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; color: white; font-weight: 800;
            z-index: 2;
        }
        .hero-avatar-wrapper img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none;
        }
        .hero-verified-badge {
            position: absolute; bottom: 4px; right: 4px;
            background: #22c55e; color: white;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; border: 4px solid #080e1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        /* Dynamic Status Badge Placement */
        .status-badge {
            position: absolute; top: 16px; right: 16px; font-size: 0.75rem; font-weight: 700;
            padding: 6px 14px; border-radius: 20px; display: flex; align-items: center; gap: 6px;
            backdrop-filter: blur(10px); z-index: 10;
        }

        /* Native App Touch & Scroll Optimizations */
        @media (max-width: 768px) {
            /* Hide Desktop Navbars smoothly */
            .desktop-nav { display: none !important; }
            
            /* Prevent pull-to-refresh & double tap zoom for true app feel */
            body { overscroll-behavior-y: none; touch-action: manipulation; padding-bottom: 80px; }
            
            /* Horizontal invisible scrollbar for Chips */
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            
            /* Fat-Finger Haptic Touch State (Scale Down on Tap) */
            button, .pro-card, .glass-btn { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
            button:active, .pro-card:active, .glass-btn:active { transform: scale(0.96); opacity: 0.9; }

            /* Glassmorphic Bottom App Bar */
            .bottom-app-bar {
                position: fixed; bottom: 0; left: 0; width: 100%; height: 72px;
                background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
                border-top: 1px solid rgba(255, 255, 255, 0.08); z-index: 1000;
                display: flex; justify-content: space-around; align-items: center;
                padding-bottom: env(safe-area-inset-bottom); /* iOS SafeArea */
            }
            .nav-item {
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                color: #94a3b8; font-size: 0.7rem; font-weight: 500; gap: 4px; text-decoration: none; transition: 0.3s;
            }
            .nav-item i { font-size: 1.2rem; margin-bottom: 2px; }
            .nav-item.active { color: #F5A623; } /* Gold active state */
            .nav-item.active i { text-shadow: 0 0 10px rgba(245, 166, 35, 0.5); }

            /* Bottom Sheet Upgrade */
            .modal-content {
                position: absolute; bottom: 0; left: 0; width: 100%; border-radius: 24px 24px 0 0;
                transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
                max-height: 85vh; overflow-y: auto; padding-bottom: 40px;
            }
            .modal-container.show .modal-content { transform: translateY(0); }
            /* Add a small drag handle line at the top of the sheet */
            .modal-content::before {
                content: ''; display: block; width: 40px; height: 4px; background: rgba(255,255,255,0.2);
                border-radius: 2px; margin: 0 auto 16px auto;
            }
        }
    </style>
</head>
<body class="min-h-screen pb-28">

    <!-- LOADING STATE -->
    <div id="loading-state" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-base">
        <div class="w-16 h-16 border-4 border-card border-t-gold rounded-full animate-spin mb-6"></div>
        <div class="text-gold font-medium tracking-widest text-sm uppercase animate-pulse">Initializing Profile...</div>
    </div>

    <!-- 404 ERROR STATE -->
    <div id="error-state" class="fixed inset-0 z-40 hidden flex-col items-center justify-center bg-base px-6 text-center">
        <div class="text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-card to-base mb-2 stroke-gold" style="-webkit-text-stroke: 1px #f5a623;">404</div>
        <h2 class="text-2xl font-bold text-white mb-3">Professional Not Found</h2>
        <p class="text-gray-400 mb-8 max-w-sm leading-relaxed mx-auto">The profile you're looking for is either inactive, removed, or the link is incorrect.</p>
        <a href="search.html" class="glass-panel px-8 py-3 rounded-full text-gold font-bold hover:bg-gold hover:text-base transition-colors duration-300 border border-gold/30 inline-block">
            &larr; Return to Search
        </a>
    </div>

    <!-- MAIN CONTENT STATE -->
    <div id="content-state" class="hidden fade-in max-w-3xl mx-auto">
        <!-- Header Banner (Hero Architecture) -->
        <a href="search.html" class="absolute top-4 left-4 w-10 h-10 rounded-full glass-panel flex items-center justify-center text-white hover:text-gold transition-colors z-20">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>

        <div class="hero-container mt-16 md:mt-12 mx-6 md:mx-0">
            <div class="hero-cover">
                <div id="statusBadge" class="status-badge status-active">
                    <i class="fa-solid fa-circle-dot"></i> Available
                </div>
            </div>
            
            <div class="hero-avatar-wrapper">
                <img id="proAvatarImg" src="" alt="Profile Image">
                <span id="proAvatarInitials"></span>
                <div class="hero-verified-badge" title="Identity Verified"><i class="fa-solid fa-check"></i></div>
            </div>

            <div style="text-align: center; padding: 0 20px 24px;">
                <div class="pro-name text-3xl font-black text-white tracking-tight mb-1" id="proName">...</div>
                <div class="pro-skill text-gold font-semibold text-lg tracking-wide uppercase" id="proSkill">...</div>
                <div class="pro-meta text-gray-400 flex items-center justify-center gap-4 text-sm mt-2 font-medium">
                    <span id="proLocation" class="flex items-center gap-1"><i class="fa-solid fa-location-dot"></i> ...</span>
                    <span id="proExp" class="flex items-center gap-1"><i class="fa-solid fa-award"></i> SkillHive Pro</span>
                </div>
            </div>
        </div>

        <div class="px-6 md:px-10 pt-4">

            <!-- Social Proof Analytics Grid -->
            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="glass-panel p-5 rounded-2xl text-center border-t border-t-white/10 relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-b from-gold/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div id="pro-rating" class="text-3xl md:text-4xl font-black text-gold mb-1">--</div>
                    <div class="text-xs text-gray-400 font-bold uppercase tracking-widest">Global Rating</div>
                </div>
                <div class="glass-panel p-5 rounded-2xl text-center border-t border-t-white/10 relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div id="pro-reviews-count" class="text-3xl md:text-4xl font-black text-white mb-1">0</div>
                    <div class="text-xs text-gray-400 font-bold uppercase tracking-widest">Engagements</div>
                </div>
            </div>

            <!-- About Section -->
            <div class="mt-10">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Professional Overview</h3>
                <div class="glass-panel p-6 rounded-2xl text-gray-300 leading-relaxed text-sm md:text-base border-l-2 border-l-gold">
                    <p id="pro-about"></p>
                </div>
            </div>

            <!-- Portfolio Assets Deck -->
            <div class="mt-10" id="portfolio-section" style="display:none;">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Visual Portfolio</h3>
                <div id="portfolio-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4"></div>
            </div>

            <!-- Reviews Block -->
            <div class="mt-10 mb-10">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Client Verification</h3>
                <div id="reviews-list" class="flex flex-col gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Sticky Action CTA -->
    <div id="cta-container" class="fixed bottom-0 left-0 right-0 p-4 bg-base/90 backdrop-blur-md border-t border-white/5 z-40 hidden flex justify-center pb-8 md:pb-4">
        <div class="flex w-full max-w-lg gap-3">
            <button id="book-btn" class="flex-1 py-4 rounded-xl font-bold text-base md:text-lg transition-all duration-300 flex items-center justify-center gap-3 uppercase tracking-wide"></button>
            
            <button id="share-btn" class="w-16 md:w-auto md:px-6 py-4 rounded-xl font-bold text-base md:text-lg bg-card border border-white/10 text-white flex items-center justify-center gap-2 hover:bg-white/10 transition-all duration-300 shadow-[0_4px_15px_rgba(0,0,0,0.2)]" title="Share Profile">
                <i class="fa-solid fa-share-nodes text-gold"></i> 
                <span class="hidden md:inline uppercase tracking-wide text-sm font-bold mt-0.5">Share</span>
            </button>
        </div>
    </div>

    <!-- Fullscreen Native Lightbox -->
    <div id="lightbox" class="fixed inset-0 bg-base/95 backdrop-blur-lg z-50 flex items-center justify-center cursor-pointer" onclick="this.classList.remove('active'); document.getElementById('lightbox-img').classList.remove('scale-100'); document.getElementById('lightbox-img').classList.add('scale-95');">
        <div class="absolute top-6 right-6 text-white bg-card w-10 h-10 rounded-full flex items-center justify-center hover:bg-gold hover:text-base transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </div>
        <img id="lightbox-img" src="" alt="Portfolio Preview" class="max-w-[95%] max-h-[90vh] rounded-xl shadow-[0_0_50px_rgba(0,0,0,0.8)] object-contain transition-transform duration-300 scale-95">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rawSlug = urlParams.get('id') || urlParams.get('slug');
            
            if (!rawSlug) {
                renderError();
                return;
            }

            // Clean slug mapping
            const slug = rawSlug.trim();

            try {
                // Poll for Supabase initialization (loaded via backend.js)
                let attempts = 0;
                while (!window._supabase && attempts < 20) {
                    await new Promise(res => setTimeout(res, 100));
                    attempts++;
                }

                if (!window._supabase) throw new Error("Database connection timeout.");

                // UUID Regex Check
                const isUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(slug);
                const queryColumn = isUUID ? 'new_id' : 'profile_slug';

                // Parallel Sub-Queries
                const [proRes, reviewsRes] = await Promise.all([
                    window._supabase.from('professionals').select('*').eq(queryColumn, slug).single(),
                    window._supabase.from('reviews').select('*').eq('pro_id', slug).eq('is_approved', 'TRUE')
                ]);

                let proData = proRes.data;
                let reviewsData = reviewsRes.data || [];

                // Vetting & Fallback Guard
                if (!proData) {
                    // Fallback to new_id if slug didn't match profile_slug
                    const fb = await window._supabase.from('professionals').select('*').eq('new_id', slug).single();
                    if (fb.data) {
                        proData = fb.data;
                    }
                }

                if (!proData || String(proData.status).toLowerCase() !== 'active') {
                    renderError();
                    return;
                }

                // If fallback succeeded or if slug matched profile_slug but reviews needed new_id
                if (proData.new_id && slug !== proData.new_id) {
                    const { data: realReviews } = await window._supabase.from('reviews')
                        .select('*')
                        .eq('pro_id', proData.new_id)
                        .eq('is_approved', 'TRUE');
                    if (realReviews) reviewsData = realReviews;
                }

                buildProfileLayout(proData, reviewsData);

            } catch (err) {
                console.error("[SkillHive] Profile execution fault:", err);
                renderError();
            }
        });

        function renderError() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('content-state').classList.add('hidden');
            document.getElementById('cta-container').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-state').classList.add('flex');
        }

        function hireViaWhatsApp(proData) {
            if (!proData || !proData.phone) return;
            let cleanPhone = proData.phone.replace(/\D/g, '');
            if (cleanPhone.startsWith('03')) cleanPhone = '92' + cleanPhone.substring(1);
            const msg = `Assalam o Alaikum ${proData.name} bhai! Main ne aapki SkillHive profile dekhi hai aur mujhe aapki ${proData.skill} service ki zaroorat hai. Kya aap available hain?`;
            window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function buildProfileLayout(pro, reviews) {
            // Dismiss loader, inject content
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('content-state').classList.remove('hidden');
            document.getElementById('cta-container').classList.remove('hidden');

            // Metadata Injection
            document.getElementById('proName').textContent = pro.name || 'Verified Professional';
            document.getElementById('proSkill').textContent = pro.skill || 'Expert Services';
            document.getElementById('proLocation').innerHTML = `<i class="fa-solid fa-location-dot"></i> ${pro.city || 'Location Undisclosed'}`;
            
            // Avatar & Cover Image Engine (Bulletproof Native <img> Logic)
            const avatarImg = document.getElementById('proAvatarImg');
            const avatarInit = document.getElementById('proAvatarInitials');
            
            if (pro.selfie_url && pro.selfie_url.startsWith('http')) {
                // Professional has an image
                avatarImg.src = pro.selfie_url;
                avatarImg.style.display = 'block';
                avatarInit.style.display = 'none';
            } else {
                // Fallback to initials
                avatarImg.style.display = 'none';
                avatarInit.style.display = 'block';
                avatarInit.textContent = pro.name ? pro.name.substring(0, 2).toUpperCase() : 'U';
            }

            // Bio
            document.getElementById('pro-about').innerHTML = (pro.about || pro.bio || 'Experienced professional verified by SkillHive. Committed to delivering high-quality results.').replace(/\n/g, '<br>');

            // Dynamic Radar Toggles
            const isAvail = pro.is_available === true || String(pro.is_available).toLowerCase() === 'true' || pro.is_available === 1;
            
            const badge = document.getElementById('statusBadge');
            const bookBtn = document.getElementById('book-btn');

            if (isAvail || pro.is_available === undefined) {
                // Available State
                if (badge) {
                    badge.className = 'status-badge status-active bg-emerald/90 text-white';
                    badge.innerHTML = '<i class="fa-solid fa-circle-dot"></i> Available Today';
                }
                
                bookBtn.className = "whatsapp-btn flex-1 py-4 rounded-xl font-bold text-base md:text-lg bg-emerald text-base shadow-[0_0_20px_rgba(34,197,94,0.3)] transition-all flex items-center justify-center gap-3 uppercase tracking-wide hover:scale-[1.02] active:scale-[0.98]";
                bookBtn.innerHTML = '<div class="w-2.5 h-2.5 rounded-full bg-base animate-breath-green"></div> Request Booking';
                bookBtn.classList.remove('busy-state');
                bookBtn.disabled = false;
                bookBtn.onclick = () => hireViaWhatsApp(pro);
            } else {
                // Unavailable State
                if (badge) {
                    badge.className = 'status-badge status-busy bg-red-500/90 text-white';
                    badge.innerHTML = '<i class="fa-solid fa-clock"></i> Currently Busy';
                }
                
                bookBtn.className = "whatsapp-btn busy-state flex-1 py-4 rounded-xl font-bold text-base md:text-lg bg-card flex items-center justify-center gap-3 uppercase tracking-wide border border-white/5";
                bookBtn.innerHTML = '<i class="fa-solid fa-lock"></i> Currently Busy / Fully Booked';
                bookBtn.disabled = true;
            }

            // Social Proof Analytics
            const revCount = reviews.length;
            document.getElementById('pro-reviews-count').textContent = revCount;
            
            const rList = document.getElementById('reviews-list');
            
            if (revCount > 0) {
                // Compute Float Mean
                let total = 0;
                let valid = 0;
                reviews.forEach(r => {
                    const rt = parseFloat(r.rating);
                    if (!isNaN(rt)) { total += rt; valid++; }
                });
                
                const mean = valid > 0 ? (total / valid).toFixed(1) : "5.0";
                document.getElementById('pro-rating').innerHTML = `${mean} <span class="text-xl text-gold">★</span>`;

                // Render Premium Layout Blocks
                reviews.forEach(r => {
                    const block = document.createElement('div');
                    block.className = "glass-panel p-5 rounded-xl border-l-4 border-l-card hover:border-l-gold transition-colors duration-300";
                    
                    // Star generator
                    let starsHtml = '';
                    const ratingInt = Math.round(parseFloat(r.rating) || 5);
                    for(let i=1; i<=5; i++) {
                        starsHtml += `<svg class="w-4 h-4 ${i <= ratingInt ? 'text-gold fill-current' : 'text-gray-600'}" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`;
                    }

                    block.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-card flex items-center justify-center font-bold text-gold text-sm uppercase">
                                    ${(r.reviewer_name || r.user_name || 'U').charAt(0)}
                                </div>
                                <div>
                                    <div class="font-bold text-white text-sm">${r.reviewer_name || r.user_name || 'Verified User'}</div>
                                    <div class="text-xs text-gray-500 mt-0.5">${r.created_at ? new Date(r.created_at).toLocaleDateString(undefined, {year: 'numeric', month: 'short', day: 'numeric'}) : 'Recent Engagement'}</div>
                                </div>
                            </div>
                            <div class="flex gap-0.5 bg-base px-2 py-1 rounded-md border border-white/5 shadow-inner">
                                ${starsHtml}
                            </div>
                        </div>
                        <p class="text-gray-300 text-sm leading-relaxed italic">"${r.review_text || r.comment || 'Outstanding professional service.'}"</p>
                    `;
                    rList.appendChild(block);
                });
            } else {
                document.getElementById('pro-rating').innerHTML = `NEW <span class="text-xl text-gold">★</span>`;
                rList.innerHTML = `<div class="glass-panel p-6 rounded-xl text-center"><p class="text-gray-400 text-sm font-medium">This professional is new to the platform. Be the first to engage!</p></div>`;
            }

            // High-End Portfolio Asset Rendering
            let assets = [];
            if (Array.isArray(pro.portfolio_urls)) {
                assets = pro.portfolio_urls;
            } else if (typeof pro.portfolio_urls === 'string') {
                try { assets = JSON.parse(pro.portfolio_urls); } catch(e) {}
            }

            if (assets && assets.length > 0) {
                document.getElementById('portfolio-section').style.display = 'block';
                const grid = document.getElementById('portfolio-grid');
                
                assets.forEach((url, idx) => {
                    if (!url) return;
                    const wrap = document.createElement('div');
                    wrap.className = "aspect-square rounded-2xl overflow-hidden cursor-pointer relative group glass-panel";
                    wrap.style.animation = `fadeIn 0.5s ease-out ${0.2 + (idx * 0.1)}s both`;
                    wrap.onclick = () => {
                        const lb = document.getElementById('lightbox');
                        const img = document.getElementById('lightbox-img');
                        img.src = url;
                        lb.classList.add('active');
                        img.classList.remove('scale-95');
                        img.classList.add('scale-100');
                    };

                    wrap.innerHTML = `
                        <img src="${url}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all duration-700 group-hover:scale-110" loading="lazy" alt="Portfolio Asset">
                        <div class="absolute inset-0 bg-base/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <div class="bg-gold/20 p-3 rounded-full text-gold backdrop-blur-sm transform scale-50 group-hover:scale-100 transition-transform duration-300">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                            </div>
                        </div>
                    `;
                    grid.appendChild(wrap);
                });
            }

            // Viral Share Engine (Organic WhatsApp Clickable Loop)
            const shareBtn = document.getElementById('share-btn');
            shareBtn.onclick = () => {
                // WhatsApp strictly requires live TLDs (like .app/.com) to create blue hyperlinks. 
                // This logic spoofs a live URL during localhost testing and uses the real one in production.
                let domain = window.location.origin;
                if (domain.includes('127.0.0.1') || domain.includes('localhost')) {
                    domain = 'https://skillhive.vercel.app'; // Prod structure for WhatsApp parsing
                }
                
                const profileUrl = `${domain}/profile.html?id=${pro.profile_slug || pro.new_id}`;
                
                // Premium WhatsApp Formatting (Bold texts and clear spacing)
                const shareText = `*SkillHive Verified Professional* 🛠️\n\n👤 *${pro.name}*\n💼 ${pro.skill}\n📍 ${pro.city}\n\n👉 *Click the link below to view profile & book:*\n${profileUrl}`;
                
                window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank');
            };
        }
    </script>
</body>
</html>
